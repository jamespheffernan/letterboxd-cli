name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: ${{ matrix.os }} / Python ${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.11", "3.12", "3.13", "3.14"]

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: CI
        if: runner.os != 'Windows'
        run: make ci PYTHON=python
      - name: CI (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
          python -m ruff check .
          python -m pytest -q
          python -m compileall -q letterboxd_cli tests
          python scripts/gen-command-docs.py docs/COMMANDS.md
          git diff --exit-code -- docs/COMMANDS.md
          python -m pip install build
          python -m build
          python -m venv "$env:RUNNER_TEMP/letterboxd-cli-smoke"
          $wheel = (Get-ChildItem dist/*.whl | Select-Object -First 1).FullName
          & "$env:RUNNER_TEMP/letterboxd-cli-smoke/Scripts/python.exe" -m pip install $wheel
          & "$env:RUNNER_TEMP/letterboxd-cli-smoke/Scripts/lbd.exe" --help | Out-Null
          & "$env:RUNNER_TEMP/letterboxd-cli-smoke/Scripts/lbd.exe" version --format json | Out-Null
